<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;

        }
        h1 {
            text-align: center;
            color: #333;
        }
        .menu {

        }

            padding: 20px;
            border-radius: 5px;
        }
        .software-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .software-item:last-child {
            border-bottom: none;
        }
        .software-item h3 {
            margin-top: 0;
        }
        .download-btn {
            display: inline-block;
            padding: 5px 10px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 3px;
        }
        .copyright {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #999;
           /* border-top: 1px solid #eee;*/

        }

</head>

    <script>
        // 简单的切换显示功能
        document.querySelectorAll('.menu a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const targetId = this.getAttribute('href').substring(1);
                
                // 隐藏所有列表
                document.querySelectorAll('.software-list').forEach(list => {
                    list.style.display = 'none';
                });
                
                // 显示目标列表
                document.getElementById(targetId).style.display = 'block';
            });
        });
        
        // 默认显示Windows应用
        document.getElementById('windows').style.display = 'block';
    </script>
</body>
